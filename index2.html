<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACEMAN VIP GACOR</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 2px solid #333; padding: 20px; border-radius: 15px; background: #0a0a0a; }
        canvas { background: #050505; border-radius: 10px; width: 100%; height: auto; margin-bottom: 10px; }
        #multiplier { font-size: 50px; color: #0f0; font-weight: bold; margin: 15px 0; }
        .stat-box { display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 18px; }
        input { width: 80%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; font-size: 16px; text-align: center; }
        .btn { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; text-transform: uppercase; }
        #btn-bet { background: #007bff; color: white; }
        #btn-cashout { background: #ff9800; color: white; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👨‍🚀 SPACEMAN VIP</h2>
        <div class="stat-box">
            <span>Saldo: <b id="balance">1000</b></span>
        </div>
        <div id="multiplier">1.00x</div>
        <canvas id="gameCanvas" width="400" height="250"></canvas>
        <input type="number" id="bet-amount" value="10" min="1">
        <button id="btn-bet" class="btn" onclick="startRun()">PASANG TARUHAN</button>
        <button id="btn-cashout" class="btn" onclick="cashOut()">AMBIL UNTUNG</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierEl = document.getElementById('multiplier');
        const balanceEl = document.getElementById('balance');
        
        // LINK REMOTE OTOMATIS KE AKUN LU
        const GITHUB_RAW = "https://raw.githubusercontent.com/ranggaananda9308-oss/spaceman-gacor777/main/remote2.json";

        let balance = 1000, isRunning = false, currentMultiplier = 1.00;
        let crashMultiplier = 2.00, spacemanX = 50, spacemanY = 150, angle = 0;

        // SISTEM PENYADAP REMOTE (Cek tiap 1 detik)
        setInterval(() => {
            fetch(GITHUB_RAW)
                .then(res => res.json())
                .then(data => { crashMultiplier = parseFloat(data.angka); })
                .catch(() => console.log("Menunggu Remote..."));
        }, 1000);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            for(let i=0; i<30; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            ctx.font = '50px Arial';
            ctx.fillText('👨‍🚀', spacemanX, spacemanY);
        }

        function update() {
            if (!isRunning) return;
            draw();
            angle += 0.05;
            spacemanY = 150 + Math.sin(angle) * 25;
            spacemanX += 0.6;

            // AKSELERASI GACOR (Biar tembus angka 10.00+)
            currentMultiplier += 0.05 * (1 + currentMultiplier * 0.06);
            multiplierEl.innerText = currentMultiplier.toFixed(2) + 'x';

            if (currentMultiplier >= crashMultiplier) {
                endGame(true);
            } else {
                requestAnimationFrame(update);
            }
        }

        function startRun() {
            let bet = parseInt(document.getElementById('bet-amount').value);
            if (bet > balance || isNaN(bet)) return alert("Cek Saldo/Bet!");
            balance -= bet; balanceEl.innerText = balance;
            isRunning = true; currentMultiplier = 1.00; spacemanX = 50;
            multiplierEl.style.color = '#0f0';
            document.getElementById('btn-bet').style.display = 'none';
            document.getElementById('btn-cashout').style.display = 'block';
            update();
        }

        function cashOut() {
            if (!isRunning) return;
            let win = parseInt(document.getElementById('bet-amount').value) * currentMultiplier;
            balance += Math.floor(win); balanceEl.innerText = balance;
            alert("🤑 PROFIT: " + win.toFixed(2) + "x");
            endGame(false);
        }

        function endGame(isCrash) {
            isRunning = false;
            if (isCrash) {
                multiplierEl.style.color = 'red';
                multiplierEl.innerText = "BOOM! @ " + currentMultiplier.toFixed(2) + "x";
            }
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-cashout').style.display = 'none';
        }
        draw();
    </script>
</body>
</html>
