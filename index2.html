<!DOCTYPE html>
<html>
<head>
    <title>SPACEMAN VIP GACOR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        canvas { border: 2px solid #333; background: #050505; width: 100%; max-width: 400px; }
        #multiplier { font-size: 48px; color: #0f0; margin: 10px; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>👨‍🚀 SPACEMAN VIP</h1>
    <p>Saldo: <span id="balance">1000</span></p>
    <input type="number" id="bet-amount" value="10" style="padding:10px; width:60px;">
    <div id="multiplier">1.00x</div>
    <canvas id="gameCanvas" width="400" height="300"></canvas>
    <br><br>
    <button id="btn-bet" class="btn" onclick="startRun()">PASANG TARUHAN</button>
    <button id="btn-cashout" class="btn" style="display:none; background:orange;" onclick="cashOut()">AMBIL UNTUNG</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const multiplierEl = document.getElementById('multiplier');
        const balanceEl = document.getElementById('balance');
        
        // LINK REMOTE LU
        const GITHUB_RAW = "https://raw.githubusercontent.com/ranggaananda9308-oss/spaceman-gacor777/main/remote2.json";

        let balance = 1000;
        let isRunning = false;
        let currentMultiplier = 1.00;
        let crashMultiplier = 2.00;
        let spacemanX = 50;
        let spacemanY = 200;
        let angle = 0;

        // CEK REMOTE TIAP 1 DETIK
        setInterval(() => {
            fetch(GITHUB_RAW)
                .then(res => res.json())
                .then(data => {
                    crashMultiplier = parseFloat(data.angka);
                }).catch(e => console.log("Remote Error"));
        }, 1000);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            for(let i=0; i<20; i++) ctx.fillRect(Math.random()*400, Math.random()*300, 2, 2);
            ctx.font = '40px Arial';
            ctx.fillText('👨‍🚀', spacemanX, spacemanY);
        }

        function update() {
            if (!isRunning) return;
            draw();
            angle += 0.05;
            spacemanY = 200 + Math.sin(angle) * 30;
            spacemanX += 0.5;

            // KODE BIAR NAIK KENCENG
            currentMultiplier += 0.05 * (1 + currentMultiplier * 0.05);
            multiplierEl.innerText = currentMultiplier.toFixed(2) + 'x';

            if (currentMultiplier >= crashMultiplier) {
                isRunning = false;
                multiplierEl.style.color = 'red';
                multiplierEl.innerText = "BOOM! MELEDAK DI " + currentMultiplier.toFixed(2) + "x";
                resetGame();
            } else {
                requestAnimationFrame(update);
            }
        }

        function startRun() {
            let bet = parseInt(document.getElementById('bet-amount').value);
            if (bet > balance) return alert("Saldo Kurang!");
            balance -= bet;
            balanceEl.innerText = balance;
            isRunning = true;
            currentMultiplier = 1.00;
            spacemanX = 50;
            multiplierEl.style.color = '#0f0';
            document.getElementById('btn-bet').style.display = 'none';
            document.getElementById('btn-cashout').style.display = 'inline-block';
            requestAnimationFrame(update);
        }

        function cashOut() {
            if (!isRunning) return;
            let win = parseInt(document.getElementById('bet-amount').value) * currentMultiplier;
            balance += win;
            balanceEl.innerText = Math.floor(balance);
            isRunning = false;
            alert("Menang: " + win.toFixed(2));
            resetGame();
        }

        function resetGame() {
            document.getElementById('btn-bet').style.display = 'inline-block';
            document.getElementById('btn-cashout').style.display = 'none';
        }
        draw();
    </script>
</body>
</html>
